<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Планёр">
    <meta name="theme-color" content="#0b0b12">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>NotePaid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0b12;
            --bg-secondary: #121219;
            --bg-card: #1a1a25;
            --bg-card-hover: #22222e;
            --bg-input: #14141d;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --accent-light: #a29bfe;
            --success: #00cec9;
            --success-glow: rgba(0, 206, 201, 0.25);
            --warning: #fdcb6e;
            --danger: #ff6b6b;
            --text-primary: #e8e6f0;
            --text-secondary: #8a879a;
            --text-muted: #5a576a;
            --border: rgba(255, 255, 255, 0.06);
            --border-accent: rgba(108, 92, 231, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Onest', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(108, 92, 231, 0.07) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(0, 206, 201, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: var(--safe-top) 16px var(--safe-bottom);
            min-height: 100dvh;
        }

        /* ====== Auth screen ====== */
        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80dvh;
            padding: 24px;
            text-align: center;
        }

        .auth-logo {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .auth-form {
            width: 100%;
            max-width: 340px;
        }

        .auth-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Onest', sans-serif;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            margin-bottom: 12px;
        }

        .auth-input::placeholder { color: var(--text-muted); }
        .auth-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-family: 'Onest', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }

        .auth-btn:active { transform: scale(0.97); }
        .auth-btn:hover { box-shadow: 0 4px 20px var(--accent-glow); }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .auth-msg {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            min-height: 20px;
        }

        .auth-msg.error { color: var(--danger); }
        .auth-msg.ok { color: var(--success); }

        .auth-footer {
            margin-top: 32px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .sync-indicator {
            position: fixed;
            top: calc(var(--safe-top) + 8px);
            right: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 11px;
            color: var(--text-muted);
            z-index: 50;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .sync-indicator.show {
            opacity: 1;
            transform: translateY(0);
        }

        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        .sync-dot.syncing {
            background: var(--warning);
            animation: pulse 1s infinite;
        }

        .sync-dot.error {
            background: var(--danger);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .user-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0 0;
            margin-bottom: -8px;
        }

        .user-email {
            font-size: 11px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }

        .btn-logout {
            font-size: 11px;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Onest', sans-serif;
            transition: color 0.2s, border-color 0.2s;
        }

        .btn-logout:hover {
            color: var(--danger);
            border-color: rgba(255, 107, 107, 0.3);
        }

        /* ====== Header ====== */
        .header {
            padding: 16px 0 24px;
            text-align: center;
        }

        .header-date {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.done { color: var(--success); }
        .stat-value.pending { color: var(--warning); }

        .stat-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ====== Tabs ====== */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 10px 8px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: 'Onest', sans-serif;
            font-size: 13px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .tab .tab-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 4px;
            background: rgba(255,255,255,0.15);
            color: inherit;
        }

        .tab:not(.active) .tab-badge {
            background: rgba(255,255,255,0.06);
        }

        /* ====== Input ====== */
        .input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Onest', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-area input::placeholder { color: var(--text-muted); }
        .input-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-add {
            width: 50px;
            height: 50px;
            border: none;
            background: var(--accent);
            color: #fff;
            border-radius: var(--radius);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .btn-add:active { transform: scale(0.92); }
        .btn-add:hover { box-shadow: 0 4px 20px var(--accent-glow); }

        /* ====== Tasks ====== */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 16px 4px 8px;
        }

        .section-label:first-child { padding-top: 0; }

        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .task-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .task-card:not(.completed)::before { opacity: 1; }

        .task-card.completed { opacity: 0.55; }
        .task-card.completed::before {
            background: var(--success);
            opacity: 1;
        }

        .task-card.overdue::before {
            background: var(--warning);
            opacity: 1;
        }

        .task-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            margin-top: 1px;
            color: transparent;
            font-size: 13px;
        }

        .task-check:hover { border-color: var(--success); }

        .task-card.completed .task-check {
            border-color: var(--success);
            background: var(--success);
            color: #fff;
        }

        .task-body {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            font-size: 15px;
            font-weight: 400;
            line-height: 1.45;
            color: var(--text-primary);
            word-break: break-word;
        }

        .task-card.completed .task-text {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .task-date-badge {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            padding: 3px 8px;
            border-radius: 6px;
        }

        .task-date-badge.overdue {
            color: var(--warning);
            background: rgba(253, 203, 110, 0.1);
        }

        .task-actions {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .task-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .task-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
        }

        .task-btn.transfer { color: var(--accent-light); }
        .task-btn.transfer:hover {
            background: var(--accent-glow);
            color: var(--accent);
        }

        .task-btn.delete:hover {
            background: rgba(255, 107, 107, 0.15);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 48px 16px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.6;
        }

        .empty-text {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .empty-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .overdue-banner {
            background: linear-gradient(135deg, rgba(253, 203, 110, 0.1), rgba(255, 107, 107, 0.08));
            border: 1px solid rgba(253, 203, 110, 0.2);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .overdue-banner-icon { font-size: 20px; }

        .overdue-banner-text {
            font-size: 13px;
            color: var(--warning);
            font-weight: 500;
            flex: 1;
        }

        .btn-transfer-all {
            padding: 8px 14px;
            background: var(--warning);
            color: var(--bg-primary);
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Onest', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s;
        }

        .btn-transfer-all:active { transform: scale(0.95); }

        .history-day { margin-bottom: 24px; }

        .history-day-header {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-secondary);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: calc(20px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            text-align: center;
            max-width: 90%;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .overlay.show { display: flex; }

        .dialog {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }

        .dialog-text {
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .dialog-actions { display: flex; gap: 8px; }

        .dialog-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Onest', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .dialog-btn:active { transform: scale(0.95); }
        .dialog-btn.cancel { background: var(--bg-card); color: var(--text-secondary); }
        .dialog-btn.confirm { background: var(--danger); color: #fff; }
        .dialog-btn.confirm-accent { background: var(--accent); color: #fff; }

        ::-webkit-scrollbar { width: 0; }

        .hidden { display: none !important; }

        .loading-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80dvh;
            flex-direction: column;
            gap: 16px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f5f4f8;
                --bg-secondary: #eae9f0;
                --bg-card: #ffffff;
                --bg-card-hover: #f0eff5;
                --bg-input: #eae9f0;
                --text-primary: #1a1a2e;
                --text-secondary: #6b6888;
                --text-muted: #9996ad;
                --border: rgba(0, 0, 0, 0.06);
                --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Sync indicator -->
        <div class="sync-indicator" id="syncIndicator">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncText">Синхронизация…</span>
        </div>

        <!-- Loading -->
        <div class="loading-screen" id="screenLoading">
            <div class="spinner"></div>
            <div style="font-size:14px;color:var(--text-secondary)">Загрузка…</div>
        </div>

        <!-- Auth screen -->
        <div class="auth-screen hidden" id="screenAuth">
            <div class="auth-logo">NotePaid</div>
            <div class="auth-subtitle">Ежедневник с облачной синхронизацией</div>
            <div class="auth-form">
                <input type="email" class="auth-input" id="authEmail" placeholder="Ваш email" autocomplete="email" inputmode="email">
                <button class="auth-btn" id="authBtn">Получить ссылку для входа</button>
                <div class="auth-msg" id="authMsg"></div>
            </div>
            <div class="auth-footer">
                Мы отправим magic link на ваш email.<br>
                Без пароля — просто нажмите на ссылку в письме.
            </div>
        </div>

        <!-- Main app -->
        <div class="hidden" id="screenMain">
            <div class="user-bar">
                <span class="user-email" id="userEmail"></span>
                <button class="btn-logout" id="btnLogout">Выйти</button>
            </div>
            <header class="header">
                <div class="header-date" id="headerDate"></div>
                <h1 class="header-title">NotePaid</h1>
                <div class="header-stats" id="headerStats"></div>
            </header>

            <nav class="tabs" id="tabs">
                <button class="tab active" data-tab="today">Сегодня<span class="tab-badge" id="badgeToday">0</span></button>
                <button class="tab" data-tab="overdue">Просрочено<span class="tab-badge" id="badgeOverdue">0</span></button>
                <button class="tab" data-tab="history">История<span class="tab-badge" id="badgeHistory">0</span></button>
            </nav>

            <section id="tabToday">
                <div class="input-area">
                    <input type="text" id="taskInput" placeholder="Новый план на сегодня…" autocomplete="off">
                    <button class="btn-add" id="btnAdd" aria-label="Добавить">+</button>
                </div>
                <div id="overdueBanner"></div>
                <div class="task-list" id="todayList"></div>
            </section>

            <section class="hidden" id="tabOverdue">
                <div class="task-list" id="overdueList"></div>
            </section>

            <section class="hidden" id="tabHistory">
                <div id="historyList"></div>
            </section>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="overlay" id="overlay">
        <div class="dialog">
            <div class="dialog-text" id="dialogText"></div>
            <div class="dialog-actions">
                <button class="dialog-btn cancel" id="dialogCancel">Отмена</button>
                <button class="dialog-btn confirm" id="dialogConfirm">Удалить</button>
            </div>
        </div>
    </div>

    <!-- Supabase JS client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <script>
    (function() {
        'use strict';

        // =============================================================
        //  CONFIGURATION — replace these with your Supabase credentials
        // =============================================================
        const SUPABASE_URL = 'https://rsdykfuhakmuzxvlvwci.supabase.co';       // e.g. https://abcdefg.supabase.co
        const SUPABASE_ANON_KEY = 'sb_publishable_bK0FrX2QLB9HQJTew3k_lQ_N9IMHDv2'; // public anon key

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =========== IndexedDB (offline cache) ===========
        const DB_NAME = 'PlannerDB_v2';
        const DB_VERSION = 1;
        const STORE_TASKS = 'tasks';
        const STORE_QUEUE = 'sync_queue';

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_TASKS)) {
                        const s = db.createObjectStore(STORE_TASKS, { keyPath: 'id' });
                        s.createIndex('date', 'date', { unique: false });
                    }
                    if (!db.objectStoreNames.contains(STORE_QUEUE)) {
                        db.createObjectStore(STORE_QUEUE, { keyPath: 'id', autoIncrement: true });
                    }
                };
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbGetAll(storeName) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const req = tx.objectStore(storeName).getAll();
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function idbPut(storeName, item) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).put(item);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function idbDelete(storeName, key) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).delete(key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function idbClear(storeName) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                tx.objectStore(storeName).clear();
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // =========== Sync queue ===========
        // When offline, mutations go into sync_queue. When online, they're replayed.

        async function enqueueSync(action, payload) {
            await idbPut(STORE_QUEUE, {
                action,
                payload,
                timestamp: Date.now()
            });
        }

        async function flushSyncQueue() {
            const queue = await idbGetAll(STORE_QUEUE);
            if (queue.length === 0) return;

            showSync('syncing', 'Синхронизация…');

            for (const item of queue) {
                try {
                    if (item.action === 'upsert') {
                        const { error } = await supabase
                            .from('tasks')
                            .upsert(item.payload, { onConflict: 'id' });
                        if (error) throw error;
                    } else if (item.action === 'delete') {
                        const { error } = await supabase
                            .from('tasks')
                            .delete()
                            .eq('id', item.payload.id);
                        if (error) throw error;
                    }
                    await idbDelete(STORE_QUEUE, item.id);
                } catch (err) {
                    console.warn('Sync item failed, will retry:', err);
                    showSync('error', 'Ошибка синхронизации');
                    return;
                }
            }

            showSync('ok', 'Синхронизировано');
        }

        // =========== Cloud sync ===========

        async function pullFromCloud() {
            try {
                const { data: session } = await supabase.auth.getSession();
                if (!session?.session?.user) return;

                const userId = session.session.user.id;
                const { data, error } = await supabase
                    .from('tasks')
                    .select('*')
                    .eq('user_id', userId);

                if (error) throw error;
                if (!data) return;

                // Merge: cloud wins by updated_at
                const localTasks = await idbGetAll(STORE_TASKS);
                const localMap = {};
                localTasks.forEach(t => localMap[t.id] = t);

                for (const remote of data) {
                    const local = localMap[remote.id];
                    if (!local || new Date(remote.updated_at) >= new Date(local.updated_at || 0)) {
                        await idbPut(STORE_TASKS, remote);
                    }
                }

                allTasks = await idbGetAll(STORE_TASKS);
            } catch (err) {
                console.warn('Pull from cloud failed:', err);
            }
        }

        async function pushToCloud(task) {
            if (!navigator.onLine) {
                await enqueueSync('upsert', task);
                return;
            }
            try {
                const { error } = await supabase
                    .from('tasks')
                    .upsert(task, { onConflict: 'id' });
                if (error) throw error;
                showSyncBrief();
            } catch (err) {
                console.warn('Push failed, queuing:', err);
                await enqueueSync('upsert', task);
            }
        }

        async function deleteFromCloud(id) {
            if (!navigator.onLine) {
                await enqueueSync('delete', { id });
                return;
            }
            try {
                const { error } = await supabase
                    .from('tasks')
                    .delete()
                    .eq('id', id);
                if (error) throw error;
                showSyncBrief();
            } catch (err) {
                console.warn('Cloud delete failed, queuing:', err);
                await enqueueSync('delete', { id });
            }
        }

        // Online/offline listeners
        window.addEventListener('online', async () => {
            await flushSyncQueue();
            await pullFromCloud();
            renderAll();
        });

        // =========== Date utilities ===========
        function todayStr() {
            return new Date().toISOString().slice(0, 10);
        }

        function daysBetween(d1, d2) {
            return Math.round((new Date(d2 + 'T00:00:00') - new Date(d1 + 'T00:00:00')) / 86400000);
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
            const weekdays = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
            return `${d.getDate()} ${months[d.getMonth()]}, ${weekdays[d.getDay()]}`;
        }

        function formatDateShort(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            const months = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
            return `${d.getDate()} ${months[d.getMonth()]}`;
        }

        function generateId() {
            return crypto.randomUUID ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2, 9));
        }

        function nowISO() {
            return new Date().toISOString();
        }

        // =========== State ===========
        let allTasks = [];
        let activeTab = 'today';
        let deleteCallback = null;
        let currentUserId = null;

        // =========== DOM refs ===========
        const $ = (s) => document.querySelector(s);
        const screenLoading = $('#screenLoading');
        const screenAuth = $('#screenAuth');
        const screenMain = $('#screenMain');
        const authEmail = $('#authEmail');
        const authBtn = $('#authBtn');
        const authMsg = $('#authMsg');
        const userEmailEl = $('#userEmail');
        const btnLogout = $('#btnLogout');
        const syncIndicator = $('#syncIndicator');
        const syncDot = $('#syncDot');
        const syncText = $('#syncText');
        const headerDate = $('#headerDate');
        const headerStats = $('#headerStats');
        const badgeToday = $('#badgeToday');
        const badgeOverdue = $('#badgeOverdue');
        const badgeHistory = $('#badgeHistory');
        const tabsEl = $('#tabs');
        const tabToday = $('#tabToday');
        const tabOverdue = $('#tabOverdue');
        const tabHistory = $('#tabHistory');
        const taskInput = $('#taskInput');
        const btnAdd = $('#btnAdd');
        const todayList = $('#todayList');
        const overdueList = $('#overdueList');
        const historyList = $('#historyList');
        const overdueBanner = $('#overdueBanner');
        const toastEl = $('#toast');
        const overlay = $('#overlay');
        const dialogText = $('#dialogText');
        const dialogCancel = $('#dialogCancel');
        const dialogConfirm = $('#dialogConfirm');

        // =========== Screens ===========
        function showScreen(name) {
            screenLoading.classList.toggle('hidden', name !== 'loading');
            screenAuth.classList.toggle('hidden', name !== 'auth');
            screenMain.classList.toggle('hidden', name !== 'main');
        }

        // =========== Auth ===========
        authBtn.addEventListener('click', async () => {
            const email = authEmail.value.trim();
            if (!email) {
                authMsg.textContent = 'Введите email';
                authMsg.className = 'auth-msg error';
                return;
            }

            authBtn.disabled = true;
            authBtn.textContent = 'Отправляем…';
            authMsg.textContent = '';

            try {
                const redirectUrl = window.location.origin + window.location.pathname;
                const { error } = await supabase.auth.signInWithOtp({
                    email,
                    options: {
                        emailRedirectTo: redirectUrl
                    }
                });

                if (error) throw error;

                authMsg.textContent = 'Ссылка отправлена! Проверьте почту (и папку «Спам»).';
                authMsg.className = 'auth-msg ok';
            } catch (err) {
                authMsg.textContent = 'Ошибка: ' + err.message;
                authMsg.className = 'auth-msg error';
            } finally {
                authBtn.disabled = false;
                authBtn.textContent = 'Получить ссылку для входа';
            }
        });

        authEmail.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') authBtn.click();
        });

        btnLogout.addEventListener('click', async () => {
            await supabase.auth.signOut();
            currentUserId = null;
            allTasks = [];
            await idbClear(STORE_TASKS);
            await idbClear(STORE_QUEUE);
            showScreen('auth');
        });

        // =========== Sync indicator ===========
        let syncTimeout;
        function showSync(status, text) {
            syncDot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
            syncText.textContent = text;
            syncIndicator.classList.add('show');
            clearTimeout(syncTimeout);
            if (status !== 'syncing') {
                syncTimeout = setTimeout(() => syncIndicator.classList.remove('show'), 2500);
            }
        }

        function showSyncBrief() {
            showSync('ok', 'Сохранено');
        }

        // =========== Core logic ===========

        async function cleanupOldTasks() {
            const today = todayStr();
            const toDelete = [];
            for (const task of allTasks) {
                const age = daysBetween(task.date, today);
                if (!task.completed && age > 2) toDelete.push(task.id);
                if (task.completed && age > 30) toDelete.push(task.id);
            }
            for (const id of toDelete) {
                await idbDelete(STORE_TASKS, id);
                await deleteFromCloud(id);
            }
            allTasks = allTasks.filter(t => !toDelete.includes(t.id));
        }

        function getTodayTasks() {
            const today = todayStr();
            return allTasks.filter(t => t.date === today && !t.deleted).sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                return (a.created_at || '').localeCompare(b.created_at || '');
            });
        }

        function getOverdueTasks() {
            const today = todayStr();
            return allTasks.filter(t => {
                const age = daysBetween(t.date, today);
                return !t.completed && !t.deleted && age > 0 && age <= 2;
            }).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
        }

        function getHistoryTasks() {
            const today = todayStr();
            return allTasks.filter(t => t.completed && !t.deleted && t.date !== today)
                .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        }

        // =========== Rendering ===========

        function renderHeader() {
            headerDate.textContent = formatDate(todayStr());
            const todayTasks = getTodayTasks();
            const done = todayTasks.filter(t => t.completed).length;
            const total = todayTasks.length;
            headerStats.innerHTML = `
                <div class="stat"><span class="stat-value">${total}</span><span class="stat-label">Всего</span></div>
                <div class="stat"><span class="stat-value done">${done}</span><span class="stat-label">Готово</span></div>
                <div class="stat"><span class="stat-value pending">${total - done}</span><span class="stat-label">Осталось</span></div>
            `;
        }

        function renderBadges() {
            badgeToday.textContent = getTodayTasks().filter(t => !t.completed).length;
            badgeOverdue.textContent = getOverdueTasks().length;
            badgeHistory.textContent = getHistoryTasks().length;
        }

        function renderTabs() {
            tabToday.classList.toggle('hidden', activeTab !== 'today');
            tabOverdue.classList.toggle('hidden', activeTab !== 'overdue');
            tabHistory.classList.toggle('hidden', activeTab !== 'history');
            tabsEl.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeTab));
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function pluralize(n, one, few, many) {
            const mod10 = n % 10, mod100 = n % 100;
            if (mod100 >= 11 && mod100 <= 19) return many;
            if (mod10 === 1) return one;
            if (mod10 >= 2 && mod10 <= 4) return few;
            return many;
        }

        function createTaskCard(task, opts = {}) {
            const { showTransfer = false, showDate = false, isOverdue = false } = opts;
            const card = document.createElement('div');
            card.className = 'task-card' + (task.completed ? ' completed' : '') + (isOverdue ? ' overdue' : '');
            card.dataset.id = task.id;

            let metaHTML = '';
            if (showDate) {
                metaHTML = `<div class="task-meta"><span class="task-date-badge ${isOverdue ? 'overdue' : ''}">${formatDateShort(task.date)}</span></div>`;
            }

            let actions = '';
            if (showTransfer && !task.completed) {
                actions += `<button class="task-btn transfer" data-action="transfer" title="Перенести на сегодня">↪</button>`;
            }
            actions += `<button class="task-btn delete" data-action="delete" title="Удалить">✕</button>`;

            card.innerHTML = `
                <button class="task-check" data-action="toggle">${task.completed ? '✓' : ''}</button>
                <div class="task-body">
                    <div class="task-text">${escapeHtml(task.text)}</div>
                    ${metaHTML}
                </div>
                <div class="task-actions">${actions}</div>
            `;
            return card;
        }

        function renderTodayTab() {
            const tasks = getTodayTasks();
            todayList.innerHTML = '';

            const overdueTasks = getOverdueTasks();
            if (overdueTasks.length > 0 && activeTab === 'today') {
                overdueBanner.innerHTML = `
                    <div class="overdue-banner">
                        <span class="overdue-banner-icon">⚠️</span>
                        <span class="overdue-banner-text">${overdueTasks.length} невыполн. ${pluralize(overdueTasks.length, 'план', 'плана', 'планов')}</span>
                        <button class="btn-transfer-all" id="btnTransferAll">Перенести все</button>
                    </div>
                `;
                const btn = $('#btnTransferAll');
                if (btn) btn.addEventListener('click', transferAllOverdue);
            } else {
                overdueBanner.innerHTML = '';
            }

            if (tasks.length === 0) {
                todayList.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Планов на сегодня пока нет</div><div class="empty-sub">Добавьте первый план выше</div></div>`;
                return;
            }

            const pending = tasks.filter(t => !t.completed);
            const done = tasks.filter(t => t.completed);

            if (pending.length > 0) {
                const l = document.createElement('div'); l.className = 'section-label'; l.textContent = 'В работе';
                todayList.appendChild(l);
                pending.forEach(t => todayList.appendChild(createTaskCard(t)));
            }

            if (done.length > 0) {
                const l = document.createElement('div'); l.className = 'section-label'; l.textContent = 'Выполнено';
                todayList.appendChild(l);
                done.forEach(t => todayList.appendChild(createTaskCard(t)));
            }
        }

        function renderOverdueTab() {
            const tasks = getOverdueTasks();
            overdueList.innerHTML = '';
            if (tasks.length === 0) {
                overdueList.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">Нет просроченных планов</div><div class="empty-sub">Все задачи выполнены вовремя</div></div>`;
                return;
            }
            tasks.forEach(t => overdueList.appendChild(createTaskCard(t, { showTransfer: true, showDate: true, isOverdue: true })));
        }

        function renderHistoryTab() {
            const tasks = getHistoryTasks();
            historyList.innerHTML = '';
            if (tasks.length === 0) {
                historyList.innerHTML = `<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">История пока пуста</div><div class="empty-sub">Выполненные планы будут здесь</div></div>`;
                return;
            }
            const grouped = {};
            tasks.forEach(t => { if (!grouped[t.date]) grouped[t.date] = []; grouped[t.date].push(t); });
            Object.keys(grouped).sort().reverse().forEach(date => {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'history-day';
                dayDiv.innerHTML = `<div class="history-day-header">${formatDate(date)}</div>`;
                const list = document.createElement('div'); list.className = 'task-list';
                grouped[date].forEach(t => list.appendChild(createTaskCard(t)));
                dayDiv.appendChild(list);
                historyList.appendChild(dayDiv);
            });
        }

        function renderAll() {
            renderHeader();
            renderBadges();
            renderTabs();
            renderTodayTab();
            renderOverdueTab();
            renderHistoryTab();
        }

        // =========== Actions ===========

        async function addTask(text) {
            text = text.trim();
            if (!text) return;
            const now = nowISO();
            const task = {
                id: generateId(),
                user_id: currentUserId,
                text: text,
                date: todayStr(),
                completed: false,
                created_at: now,
                updated_at: now
            };
            await idbPut(STORE_TASKS, task);
            allTasks.push(task);
            taskInput.value = '';
            renderAll();
            showToast('План добавлен');
            await pushToCloud(task);
        }

        async function toggleTask(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;
            task.completed = !task.completed;
            task.updated_at = nowISO();
            await idbPut(STORE_TASKS, task);
            renderAll();
            await pushToCloud(task);
        }

        async function deleteTask(id) {
            await idbDelete(STORE_TASKS, id);
            allTasks = allTasks.filter(t => t.id !== id);
            renderAll();
            showToast('План удалён');
            await deleteFromCloud(id);
        }

        async function transferTask(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;
            task.date = todayStr();
            task.updated_at = nowISO();
            await idbPut(STORE_TASKS, task);
            renderAll();
            showToast('План перенесён на сегодня');
            await pushToCloud(task);
        }

        async function transferAllOverdue() {
            const overdue = getOverdueTasks();
            const today = todayStr();
            const now = nowISO();
            for (const task of overdue) {
                task.date = today;
                task.updated_at = now;
                await idbPut(STORE_TASKS, task);
                await pushToCloud(task);
            }
            renderAll();
            showToast(`${overdue.length} ${pluralize(overdue.length, 'план перенесён', 'плана перенесено', 'планов перенесено')}`);
        }

        // =========== Events ===========

        tabsEl.addEventListener('click', (e) => {
            const tab = e.target.closest('.tab');
            if (!tab) return;
            activeTab = tab.dataset.tab;
            renderAll();
        });

        btnAdd.addEventListener('click', () => addTask(taskInput.value));
        taskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(taskInput.value); });

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const card = btn.closest('.task-card');
            if (!card) return;
            const id = card.dataset.id;
            const action = btn.dataset.action;

            if (action === 'toggle') toggleTask(id);
            if (action === 'transfer') transferTask(id);
            if (action === 'delete') showConfirmDialog('Удалить этот план?', () => deleteTask(id));
        });

        function showConfirmDialog(text, onConfirm, confirmLabel = 'Удалить', isAccent = false) {
            dialogText.textContent = text;
            dialogConfirm.textContent = confirmLabel;
            dialogConfirm.className = 'dialog-btn ' + (isAccent ? 'confirm-accent' : 'confirm');
            overlay.classList.add('show');
            deleteCallback = onConfirm;
        }

        dialogCancel.addEventListener('click', () => { overlay.classList.remove('show'); deleteCallback = null; });
        dialogConfirm.addEventListener('click', () => { overlay.classList.remove('show'); if (deleteCallback) deleteCallback(); deleteCallback = null; });
        overlay.addEventListener('click', (e) => { if (e.target === overlay) { overlay.classList.remove('show'); deleteCallback = null; } });

        let toastTimeout;
        function showToast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2200);
        }

        // =========== Init ===========

        async function initApp(user) {
            currentUserId = user.id;
            userEmailEl.textContent = user.email;

            // Load local data first (instant)
            allTasks = await idbGetAll(STORE_TASKS);
            showScreen('main');
            renderAll();

            // Then sync with cloud
            if (navigator.onLine) {
                await flushSyncQueue();
                await pullFromCloud();
                await cleanupOldTasks();
                renderAll();
            } else {
                await cleanupOldTasks();
                renderAll();
            }
        }

        async function boot() {
            showScreen('loading');

            // Check for magic link token in URL hash
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            if (hashParams.get('access_token')) {
                // Supabase will handle this automatically
                // Clean up the URL
                history.replaceState(null, '', window.location.pathname);
            }

            // Listen for auth changes
            supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session?.user) {
                    await initApp(session.user);
                } else if (event === 'SIGNED_OUT') {
                    showScreen('auth');
                }
            });

            // Check existing session
            const { data } = await supabase.auth.getSession();
            if (data?.session?.user) {
                await initApp(data.session.user);
            } else {
                showScreen('auth');
            }
        }

        boot();

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error:', err));
        }
    })();
    </script>
